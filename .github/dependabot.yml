# Dependabot 依赖版本更新 & 安全告警配置
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # 根目录 npm 依赖（concurrently 等）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      root-minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # 前端（client）npm 依赖
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      client-minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # 后端（server）npm 依赖
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      server-minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-updates:
        patterns:
          - "*"
